services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peopleflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peopleflow}
      POSTGRES_DB: ${POSTGRES_DB:-peopleflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peopleflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-peopleflow}:${POSTGRES_PASSWORD:-peopleflow}@postgres:5432/${POSTGRES_DB:-peopleflow}?schema=public
    ports:
      - "${PORT:-3000}:3000"

volumes:
  postgres_data:
